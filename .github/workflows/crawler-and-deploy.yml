name: Crawler and Deploy

on:
  schedule:
    # 毎日UTC時間の0時（日本時間の午前9時）に実行
    - cron: '0 0 * * *'
  workflow_dispatch: # 手動実行用

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run crawler
        run: npm run crawl
        continue-on-error: true

      - name: Commit updated data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add events-data.json crawler-log.txt || true
          git diff --staged --quiet || git commit -m "Auto-update events-data.json [skip ci]"
          git push || echo "Nothing to push"

      - name: Deploy to MuuMuu Server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: /web/beauty-study-matome.site/
          timeout: 60000
          log-level: verbose
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .github/**
            crawler.js
            crawler-log.txt
            package.json
            package-lock.json
            .gitignore
            .gitignore.bak
            hero-bg.png
