name: Crawler and FTP Deploy (MuuMuu Server)

on:
  schedule:
    # 毎日日本時間の午前9時（UTC 0時）
    - cron: '0 0 * * *'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  crawl-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run crawler
        run: npm run crawl

      - name: Commit updated data back to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add events-data.json crawler-log.txt
          git diff --staged --quiet || git commit -m "Auto-update events-data.json [skip ci]"
          git push

      - name: Deploy to MuuMuu Server via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          # サーバーにアップロードしない（不要・機密）ファイルを除外
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            crawler.js
            package.json
            package-lock.json
            playwright-report/**
