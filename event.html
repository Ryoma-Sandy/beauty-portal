<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>イベント詳細 | 美容医療 学会・勉強会ポータル</title>
    <meta name="description" content="">
    <meta property="og:title" content="">
    <meta property="og:description" content="">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="ja_JP">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .event-detail-container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }
        .breadcrumb a {
            color: var(--primary-dark);
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .breadcrumb i { font-size: 0.7rem; }
        .detail-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border-color);
        }
        .detail-header {
            background: linear-gradient(135deg, rgba(44,53,57,0.95), rgba(30,36,40,0.98));
            padding: 2rem 2.5rem 2.5rem;
            color: #FFF;
        }
        .detail-category {
            display: inline-block;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #FFF;
            padding: 0.25rem 0.8rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin-bottom: 0.8rem;
        }
        .detail-title {
            font-size: 1.6rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 0.6rem;
        }
        .detail-date {
            font-size: 1rem;
            color: var(--primary-light);
            font-weight: 500;
        }
        .detail-body {
            padding: 2rem 2.5rem;
        }
        .detail-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.2rem;
            margin-bottom: 1.5rem;
        }
        .meta-item {
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }
        .meta-item i {
            color: var(--primary);
            margin-top: 0.15rem;
            width: 18px;
            text-align: center;
        }
        .meta-item .meta-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            display: block;
        }
        .meta-item .meta-value {
            font-size: 0.95rem;
            font-weight: 500;
        }
        .detail-description {
            margin-bottom: 1.5rem;
            line-height: 1.8;
            color: var(--text-main);
        }
        .detail-description h3 {
            font-size: 1rem;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }
        .detail-actions {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
        }
        .detail-actions .btn-primary {
            flex: 1;
            text-align: center;
        }
        .detail-actions .btn-back {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.7rem 1.2rem;
            border-radius: var(--radius-sm);
            font-family: inherit;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            font-size: 0.88rem;
        }
        .detail-actions .btn-back:hover {
            border-color: var(--primary);
            color: var(--primary-dark);
        }
        .detail-source {
            margin-top: 1rem;
        }
        .detail-loading {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }
        .detail-loading i { font-size: 2rem; margin-bottom: 1rem; display: block; color: var(--primary); }
        @media (max-width: 600px) {
            .detail-meta { grid-template-columns: 1fr; }
            .detail-header { padding: 1.5rem; }
            .detail-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <!-- ===== ユーザーナビバー ===== -->
    <nav class="user-nav">
        <div class="user-nav-inner">
            <a href="index.html" style="text-decoration:none;">
                <span class="user-nav-logo"><i class="fas fa-star-of-life"></i> 美容医療ポータル</span>
            </a>
        </div>
    </nav>

    <main class="event-detail-container">
        <nav class="breadcrumb" aria-label="パンくずリスト">
            <a href="index.html"><i class="fas fa-home"></i> ホーム</a>
            <i class="fas fa-chevron-right"></i>
            <span id="breadcrumb-title">イベント詳細</span>
        </nav>

        <div id="event-detail">
            <div class="detail-loading">
                <i class="fas fa-spinner fa-pulse"></i>
                <p>読み込み中...</p>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 美容医療 学会・勉強会ポータル All Rights Reserved.</p>
    </footer>

    <script src="event.js"></script>
</body>
</html>
